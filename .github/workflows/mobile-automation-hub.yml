name: Mobile Automation Hub

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - preprod
          - prod
      test_flow:
        description: 'Workflow to Execute'
        required: true
        default: 'Onboarding'
        type: choice
        options:
          - Onboarding
          - Delivery Flow
          - Return To Store

jobs:
  run-task:
    runs-on: self-hosted

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Tests
      shell: pwsh
      run: |
        # Resolve environment - use input or default to staging for scheduled runs
        $ENV = if ("${{ github.event.inputs.environment }}" -ne "") { "${{ github.event.inputs.environment }}" } else { "staging" }
        $FLOW = if ("${{ github.event.inputs.test_flow }}" -ne "") { "${{ github.event.inputs.test_flow }}" } else { "Onboarding" }

        Write-Host "Environment: $ENV"
        Write-Host "Flow: $FLOW"

        # Map flow to spec file
        $SPEC_FILE = switch ($FLOW) {
          "Onboarding"     { "tests/Smoke/Onboarding.ts" }
          "Delivery Flow"  { "tests/Smoke/Delivery.ts" }
          "Return To Store"{ "tests/Smoke/Return.ts" }
          default          { Write-Error "Unknown flow: $FLOW"; exit 1 }
        }

        Write-Host "Running: npm run test:$ENV -- --spec $SPEC_FILE"
        & npm run "test:$ENV" -- --spec $SPEC_FILE