name: Mobile Automation Hub

on:
  schedule:
    # Runs at 00:00 UTC every day (approx 5:30 AM IST)
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - preprod
          - prod
      test_flow:
        description: 'Workflow to Execute'
        required: true
        default: 'Onboarding'
        type: choice
        options:
          - Onboarding
          - Delivery Flow
          - Return To Store

jobs:
  run-task:
    runs-on: macos-latest # Using modern Apple Silicon runners
    
    steps:
    - name: Free Disk Space
      run: |
        sudo rm -rf /Library/Developer/CommandLineTools
        sudo rm -rf /usr/local/lib/node_modules
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf /usr/share/dotnet
        
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Execute Automation
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 30
        target: google_apis
        arch: arm64-v8a # Must match Apple Silicon runner for hardware speed
        profile: pixel_6
        disable-animations: true
        emulator-options: -no-window -gpu swiftshader_indirect -no-audio -no-boot-anim
        script: |
          echo "Starting Appium Server..."
          npx appium --use-plugins=inspector --allow-cors &
          
          # Detect Trigger Type & Set Variables
          # If it's a manual run, use inputs. If it's a schedule run, use defaults.
          ENV="${{ github.event.inputs.environment }}"
          FLOW="${{ github.event.inputs.test_flow }}"
          
          if [ -z "$ENV" ]; then 
            echo "Trigger: Scheduled Run. Defaulting Environment to staging."
            ENV="staging"
          else
            echo "Trigger: Manual Run. Environment: $ENV"
          fi
          
          if [ -z "$FLOW" ]; then 
            echo "Trigger: Scheduled Run. Defaulting Flow to Onboarding."
            FLOW="Onboarding"
          else
            echo "Trigger: Manual Run. Flow: $FLOW"
          fi
          
          # Mapping Logic
          if [ "$FLOW" == "Onboarding" ]; then
            SPEC_FILE="tests/Smoke/Onboarding.ts"
          elif [ "$FLOW" == "Delivery Flow" ]; then
            SPEC_FILE="tests/Smoke/Delivery.ts"
          elif [ "$FLOW" == "Return To Store" ]; then
            SPEC_FILE="tests/Smoke/Return.ts"
          else
            echo "Error: Unknown test flow selected"
            exit 1
          fi
          
          echo "Executing: npm run test:$ENV -- --spec $SPEC_FILE"
          npm run test:$ENV -- --spec $SPEC_FILE
